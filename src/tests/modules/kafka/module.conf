#
#  Test harness configuration for rlm_kafka.
#
#  KAFKA_TEST_SERVER is supplied by CI (Redpanda service) or by the developer
#  when running `make test.modules.kafka` locally.  The service listens on port
#  9092 for Kafka wire-protocol traffic.
#
#
#  rlm_json registers the `map json` processor the tests use to parse
#  the subscriber's JSON-array output files.
#
json {
}

kafka {
	server = "$ENV{KAFKA_TEST_SERVER}:9092"

	#
	#  Topics the tests produce to.  Each test file owns its own topic(s)
	#  so the per-test subscriber output can assert round-trip bytes
	#  without cross-test pollution.  The subscriber helper
	#  (scripts/ci/kafka-subscribe.sh) resets each topic on start, so
	#  repeat local runs always see only the current test's produces.
	#
	topic {
		#
		#  base.unlang - single xlat-form produce.
		#
		freeradius-test-base {
		}

		#
		#  xlat.unlang - multiple xlat-form produces to two topics.
		#
		freeradius-test-xlat {
		}
		freeradius-test-xlat-alt {
		}

		#
		#  method.unlang - method/send/recv aliases against one topic.
		#
		freeradius-test-method {
			value = "%{User-Name}"
		}

		#
		#  keyed.unlang - produce with a declared key (deterministic
		#  partitioning) and a sibling "no key" topic for the
		#  unkeyed variant of the same test.
		#
		freeradius-test-keyed {
			value = "payload=%{User-Name}"
			key   = &User-Name
		}
		freeradius-test-keyed-nokey {
			value = "%{User-Name}"
		}

		#
		#  binary.unlang - binary + two empty-payload produces.
		#  Declared `value = ""` so the method-form empty-produce
		#  path works; xlat produces into the same topic override it.
		#
		freeradius-test-binary {
			value = ""
		}

		#
		#  invalid.unlang - edge-case payloads (empty, long, special
		#  chars, multibyte).  All xlat-form so no declared value.
		#
		freeradius-test-invalid {
		}

		#
		#  implicit.unlang - bare `kafka` inside `recv Access-Request`
		#  resolves the topic from the section's name2, so the topic
		#  here must match the packet type verbatim.
		#
		Access-Request {
			value = "recv-implicit %{User-Name}"
		}
	}

	flush_timeout = 5s
}
