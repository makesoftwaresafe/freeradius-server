#
#  Test harness configuration for rlm_kafka.
#
#  KAFKA_TEST_SERVER is supplied by CI (Redpanda service) or by the developer
#  when running `make test.modules.kafka` locally.  The service listens on port
#  9092 for Kafka wire-protocol traffic.
#
kafka {
	server = "$ENV{KAFKA_TEST_SERVER}:9092"

	#
	#  Topics the tests produce to.  Declared up-front; the method and xlat
	#  only accept declared topic names so typos fail at parse time rather
	#  than silently creating new topics.
	#
	topic {
		freeradius-test-base {
		}
		freeradius-test-xlat {
		}
		freeradius-test-xlat-alt {
		}
	}

	flush_timeout = 5s
}
